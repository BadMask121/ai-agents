[package]
name = "dj-sync"
version = "0.1.0"
edition = "2021"
description = "Telegram-driven Spotify -> Rekordbox prep pipeline"

[[bin]]
name = "dj-sync"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
teloxide = { version = "0.12", features = ["macros"] }

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

lofty = "0.18"
walkdir = "2"
strsim = "0.11"
unicode-normalization = "0.1"
quick-xml = { version = "0.31", features = ["serialize"] }

anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

dotenvy = "0.15"
toml = "0.8"
dirs = "5"
url = "2"
regex = "1"
once_cell = "1"
bincode = "1"

[dev-dependencies]
tempfile = "3"
