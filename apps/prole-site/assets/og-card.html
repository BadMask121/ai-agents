<!doctype html>
<!-- Source for assets/og.png (1200x630 social card). Regenerate with:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
       --headless --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \
       --screenshot=og.png --window-size=1200,630 \
       --default-background-color=00000000 og-card.html -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        display: flex; flex-direction: column; justify-content: center;
        padding: 84px 90px; color: #e9eaee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background:
          radial-gradient(900px 500px at 80% -150px, #2a1d18 0%, transparent 60%),
          radial-gradient(700px 500px at 0% 120%, #16181e 0%, transparent 55%),
          #0b0c0f;
      }
      .row { display: flex; align-items: center; gap: 26px; margin-bottom: 40px; }
      .row img { width: 96px; height: 96px; border-radius: 22px;
        box-shadow: 0 18px 50px -16px rgba(217,119,87,0.55); }
      .name { font-size: 60px; font-weight: 720; letter-spacing: -0.03em; }
      h1 { font-size: 76px; line-height: 1.04; letter-spacing: -0.035em; font-weight: 740; }
      h1 .accent { color: #d97757; }
      p { margin-top: 30px; font-size: 30px; color: #9aa0ab; max-width: 940px; line-height: 1.4; }
      .chip { margin-top: 44px; display: inline-flex; align-self: flex-start; gap: 12px;
        align-items: center; font-size: 24px; color: #cfd3da;
        border: 1px solid #2b2f38; background: #14161b; padding: 12px 22px; border-radius: 999px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; background: #d97757; }
    </style>
  </head>
  <body>
    <div class="row">
      <img src="prole-icon.png" alt="" />
      <span class="name">Prole</span>
    </div>
    <h1>Snip anything on screen.<br /><span class="accent">Paste it anywhere.</span></h1>
    <p>A native macOS menu bar tool. Snip, annotate, and paste anywhere.</p>
    <div class="chip"><span class="dot"></span> Free · macOS 12+ · Apple Silicon &amp; Intel</div>
  </body>
</html>
