server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Static landing page.
    location / {
        try_files $uri $uri/ =404;
    }

    # DMG (and any future release artifacts) served from a bind-mounted volume.
    # Host /data/prole-releases is mounted to /srv/prole-releases by Coolify; the
    # release script (apps/prole/scripts/release.sh) scp's Prole.dmg into it.
    location /download/ {
        alias /srv/prole-releases/;
        autoindex off;
        types {
            application/x-apple-diskimage  dmg;
        }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    # Light caching for static assets.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
