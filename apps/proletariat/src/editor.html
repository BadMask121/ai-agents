<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="toolbar">
      <div class="group">
        <button class="tool" data-tool="rect" title="Rectangle" aria-label="Rectangle">
          <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1.5" /></svg>
        </button>
        <button class="tool" data-tool="arrow" title="Arrow" aria-label="Arrow">
          <svg viewBox="0 0 24 24"><path d="M5 19 L19 5" /><path d="M11 5 H19 V13" /></svg>
        </button>
        <button class="tool" data-tool="pen" title="Pen" aria-label="Pen">
          <svg viewBox="0 0 24 24"><path d="M14 4l6 6M3.5 20.5l1.2-4.2L15 6l3 3-10.3 10.3z" /></svg>
        </button>
      </div>
      <div class="group">
        <button class="icon" id="undo" title="Undo" aria-label="Undo">
          <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5" /><path d="M4 9h10a6 6 0 0 1 0 12H8" /></svg>
        </button>
        <button class="icon" id="clear" title="Clear all" aria-label="Clear all">
          <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" /></svg>
        </button>
      </div>
      <div class="spacer"></div>
      <button class="icon ghost" id="cancel" title="Cancel" aria-label="Cancel">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18" /></svg>
      </button>
    </div>

    <div id="stage"><canvas id="canvas"></canvas></div>

    <div id="message-bar">
      <textarea id="message" rows="1" placeholder="Message to Claude…"></textarea>
      <button id="copy" title="Copy to clipboard" aria-label="Copy to clipboard">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="9" width="11" height="11" rx="2" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
      </button>
    </div>

    <script type="module" src="./editor.ts"></script>
  </body>
</html>
